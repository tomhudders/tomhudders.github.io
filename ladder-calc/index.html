<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>🪜 Ladder Match Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<h1>Ladder Match Calculator</h1>

<div class="layout">
  <label for="scenario"><strong>Setup:</strong></label>
  <select id="scenario">
    <option value="5" selected>5 vs 5</option>
    <option value="4">4 vs 4</option>
    <option value="3">3 vs 3</option>
  </select>


  <table>
    <thead>
      <tr>
        <th>Position</th>
        <th>HMB</th>
        <th>Opponent</th>
        <th>Points</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <div class="result-card" id="output">
    <h2>Result</h2>
    <p>Select positions to see the minimum needed for HMB to win.</p>
  </div>
</div>

<script src="calculator.js"></script>
</body>
</html>
